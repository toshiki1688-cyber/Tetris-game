<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>俄罗斯方块</title>
  <style>
    body {
      background: #111;
      display: flex;
      flex-direction: column;
      align-items: center;
      color: #fff;
      font-family: Arial, sans-serif;
    }
    canvas {
      border: 2px solid #fff;
      background: #222;
    }
    #score {
      margin: 10px;
      font-size: 20px;
    }
    .controls {
      margin-top: 10px;
    }
    .controls button {
      margin: 5px;
      padding: 10px 20px;
      font-size: 16px;
      background: #444;
      color: #fff;
      border: none;
      border-radius: 5px;
    }
    .controls button:hover {
      background: #666;
    }
    #pauseBtn {
      position: absolute;
      top: 10px;
      right: 10px;
      padding: 10px 20px;
      font-size: 16px;
      background: #c33;
      color: #fff;
      border: none;
      border-radius: 5px;
    }
  </style>
</head>
<body>
  <h1>俄罗斯方块</h1>
  <div id="score">分数: 0</div>
  <button id="pauseBtn">暂停</button>
  <canvas id="tetris" width="240" height="400"></canvas>
  <div class="controls">
    <button onclick="playerMove(-1)">← 左</button>
    <button onclick="playerMove(1)">→ 右</button>
    <button onclick="playerDrop()">↓ 下</button>
    <button onclick="playerRotate(-1)">↺ 逆时针</button>
    <button onclick="playerRotate(1)">↻ 顺时针</button>
    
  </div>
  <script>

    function playerHardDrop() {
  while (!collide(arena, player)) {
    player.pos.y++;
  }
  player.pos.y--; // 回到最后合法位置
  merge(arena, player);
  playerReset();
  arenaSweep();
  soundDrop.currentTime = 0;
  soundDrop.play();
  dropCounter = 0;
    }
    
    const canvas = document.getElementById('tetris');
    const context = canvas.getContext('2d');
    context.scale(20, 20);

    const scoreElement = document.getElementById('score');

    // 音效
    const soundDrop = new Audio("https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg");
    const soundRotate = new Audio("https://actions.google.com/sounds/v1/cartoon/slide_whistle.ogg");
    const soundClear = new Audio("https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg");

    function arenaSweep() {
      let rowCount = 1;
      outer: for (let y = arena.length -1; y >= 0; --y) {
        for (let x = 0; x < arena[y].length; ++x) {
          if (arena[y][x] === 0) {
            continue outer;
          }
        }
        const row = arena.splice(y, 1)[0].fill(0);
        arena.unshift(row);
        y++;
        player.score += rowCount * 10;
        rowCount *= 2;
        soundDrop.currentTime = 0;
        soundDrop.play();
      }
      updateScore();
    }

    function collide(arena, player) {
      const m = player.matrix;
      const o = player.pos;
      for (let y = 0; y < m.length; ++y) {
        for (let x = 0; x < m[y].length; ++x) {
          if (m[y][x] !== 0 &&
             (arena[y + o.y] &&
              arena[y + o.y][x + o.x]) !== 0) {
            return true;
          }
        }
      }
      return false;
    }

    function createMatrix(w, h) {
      const matrix = [];
      while (h--) {
        matrix.push(new Array(w).fill(0));
      }
      return matrix;
    }

    function createPiece(type) {
      if (type === 'T') return [[0,0,0],[1,1,1],[0,1,0]];
      else if (type === 'O') return [[2,2],[2,2]];
      else if (type === 'L') return [[0,3,0],[0,3,0],[0,3,3]];
      else if (type === 'J') return [[0,4,0],[0,4,0],[4,4,0]];
      else if (type === 'I') return [[0,5,0,0],[0,5,0,0],[0,5,0,0],[0,5,0,0]];
      else if (type === 'S') return [[0,6,6],[6,6,0],[0,0,0]];
      else if (type === 'Z') return [[7,7,0],[0,7,7],[0,0,0]];
    }

    function drawMatrix(matrix, offset) {
      matrix.forEach((row, y) => {
        row.forEach((value, x) => {
          if (value !== 0) {
            context.fillStyle = colors[value];
            context.fillRect(x + offset.x, y + offset.y, 1, 1);
          }
        });
      });
    }

    function draw() {
      context.fillStyle = '#000';
      context.fillRect(0, 0, canvas.width, canvas.height);
      drawMatrix(arena, {x:0, y:0});
      drawMatrix(player.matrix, player.pos);
    }
    function merge(arena, player) {
      player.matrix.forEach((row, y) => {
        row.forEach((value, x) => {
          if (value !== 0) {
            arena[y + player.pos.y][x + player.pos.x] = value;
          }
        });
      });
    }

    function playerDrop() {
      player.pos.y++;
      if (collide(arena, player)) {
        player.pos.y--;
        merge(arena, player);
        playerReset();
        arenaSweep();
      }
      dropCounter = 0;
      soundDrop.play();
    }

    function playerMove(dir) {
      player.pos.x += dir;
      if (collide(arena, player)) {
        player.pos.x -= dir;
      }
    }

    function playerReset() {
      const pieces = 'TJLOSZI';
      player.matrix = createPiece(pieces[pieces.length * Math.random() | 0]);
      player.pos.y = 0;
      player.pos.x = (arena[0].length / 2 | 0) -
                     (player.matrix[0].length / 2 | 0);
      if (collide(arena, player)) {
        arena.forEach(row => row.fill(0));
        player.score = 0;
        updateScore();
      }
    }

    function playerRotate(dir) {
      const pos = player.pos.x;
      let offset = 1;
      rotate(player.matrix, dir);
      while (collide(arena, player)) {
        player.pos.x += offset;
        offset = -(offset + (offset > 0 ? 1 : -1));
        if (offset > player.matrix[0].length) {
          rotate(player.matrix, -dir);
          player.pos.x = pos;
          return;
        }
      }
      soundRotate.currentTime = 0;
      soundRotate.play();
    }

    function rotate(matrix, dir) {
      for (let y = 0; y < matrix.length; ++y) {
        for (let x = 0; x < y; ++x) {
          [matrix[x][y], matrix[y][x]] = [matrix[y][x], matrix[x][y]];
        }
      }
      if (dir > 0) matrix.forEach(row => row.reverse());
      else matrix.reverse();
    }

    let dropCounter = 0;
    let dropInterval = 1000;
    let lastTime = 0;
    let paused = false;

    document.getElementById('pauseBtn').addEventListener('click', () => {
      paused = !paused;
      document.getElementById('pauseBtn').innerText = paused ? '开始' : '暂停';
    });

    function update(time = 0) {
      if (!paused) {
        const deltaTime = time - lastTime;
        lastTime = time;
        dropCounter += deltaTime;
        if (dropCounter > dropInterval) {
          playerDrop();
        }
        draw();
      }
      requestAnimationFrame(update);
    }

    function updateScore() {
      scoreElement.innerText = '分数: ' + player.score;
    }

    const colors = [null,'#FF0D72','#0DC2FF','#0DFF72','#F538FF','#FF8E0D','#FFE138','#3877FF'];
    const arena = createMatrix(12, 20);
    const player = {pos:{x:0,y:0},matrix:null,score:0};

    document.addEventListener('keydown', event => {
      if (event.keyCode === 37) playerMove(-1);
      else if (event.keyCode === 39) playerMove(1);
      else if (event.keyCode === 40) playerDrop();
      else if (event.keyCode === 81) playerRotate(-1);
      else if (event.keyCode === 87) playerRotate(1);
    });

    playerReset();
    update();
    updateScore();
  </script>
</body>
</html>
