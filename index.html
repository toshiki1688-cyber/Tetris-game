<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>俄罗斯方块</title>
  <style>
    body {
      background: #111;
      display: flex;
      flex-direction: column;
      align-items: center;
      color: #fff;
      font-family: Arial, sans-serif;
    }
    canvas {
      border: 2px solid #fff;
      background: #222;
    }
    #score {
      margin: 10px;
      font-size: 20px;
    }
    .controls {
      margin-top: 10px;
    }
    .controls button {
      margin: 5px;
      padding: 10px 20px;
      font-size: 16px;
      background: #444;
      color: #fff;
      border: none;
      border-radius: 5px;
    }
    .controls button:hover {
      background: #666;
    }
  </style>
</head>
<body>
  <h1>俄罗斯方块</h1>
  <div id="score">分数: 0</div>
  <canvas id="tetris" width="240" height="400"></canvas>
  <div class="controls">
    <button onclick="playerMove(-1)">← 左</button>
    <button onclick="playerMove(1)">→ 右</button>
    <button onclick="playerDrop()">↓ 下</button>
    <button onclick="playerRotate(-1)">↺ 逆时针</button>
    <button onclick="playerRotate(1)">↻ 顺时针</button>
  </div>
  <script>
    const canvas = document.getElementById('tetris');
    const context = canvas.getContext('2d');
    context.scale(20, 20);

    const scoreElement = document.getElementById('score');

    function arenaSweep() {
      let rowCount = 1;
      outer: for (let y = arena.length -1; y >= 0; --y) {
        for (let x = 0; x < arena[y].length; ++x) {
          if (arena[y][x] === 0) {
            continue outer;
          }
        }
        const row = arena.splice(y, 1)[0].fill(0);
        arena.unshift(row);
        y++;
        player.score += rowCount * 10;
        rowCount *= 2;
      }
      updateScore();
    }

    function collide(arena, player) {
      const m = player.matrix;
      const o = player.pos;
      for (let y = 0; y < m.length; ++y) {
        for (let x = 0; x < m[y].length; ++x) {
          if (m[y][x] !== 0 &&
             (arena[y + o.y] &&
              arena[y + o.y][x + o.x]) !== 0) {
            return true;
          }
        }
      }
      return false;
    }

      const matrix = [];
      while (h--) {
        matrix.push(new Array(w).fill(0));
      }
      return matrix;
